name: Terraform Jour 5 — CI

on:
  push:
    branches: [main]
    paths:
      - 'AISC75-Jour5-CICD-Securite/**'
      - '.github/workflows/terraform-jour5.yml'
  pull_request:
    branches: [main]
    paths:
      - 'AISC75-Jour5-CICD-Securite/**'
      - '.github/workflows/terraform-jour5.yml'

permissions:
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.9.8"
  WORKDIR: AISC75-Jour5-CICD-Securite

jobs:
  lint-and-security:
    name: Lint & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt
        working-directory: ${{ env.WORKDIR }}
        run: terraform fmt -check -recursive -diff

      - name: terraform validate (module nginx-config)
        working-directory: ${{ env.WORKDIR }}/modules/nginx-config
        run: |
          terraform init -backend=false
          terraform validate

      - name: terraform validate (env dev)
        working-directory: ${{ env.WORKDIR }}/environments/dev
        run: |
          terraform init -backend=false
          terraform validate

      - name: terraform validate (env prod)
        working-directory: ${{ env.WORKDIR }}/environments/prod
        run: |
          terraform init -backend=false
          terraform validate

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.61.0

      - name: tflint
        working-directory: ${{ env.WORKDIR }}
        run: |
          tflint --init
          tflint --recursive

      - name: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.WORKDIR }}
          framework: terraform
          output_format: cli
          soft_fail: true

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ${{ env.WORKDIR }}
          soft_fail: true

  terraform-test:
    name: Terraform Test (unit)
    runs-on: ubuntu-latest
    needs: lint-and-security
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Run terraform test
        working-directory: ${{ env.WORKDIR }}/modules/nginx-config
        run: |
          terraform init -backend=false
          terraform test

  plan-dev:
    name: Plan (dev)
    runs-on: ubuntu-latest
    needs: terraform-test
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Plan
        working-directory: ${{ env.WORKDIR }}/environments/dev
        run: |
          terraform init
          terraform plan -no-color

  plan-prod:
    name: Plan (prod)
    runs-on: ubuntu-latest
    needs: terraform-test
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Plan
        working-directory: ${{ env.WORKDIR }}/environments/prod
        run: |
          terraform init
          terraform plan -no-color
